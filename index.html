<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de señales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/svg+xml" href="icono.svg">
</head>

<body class="flex flex-col min-h-screen bg-gray-900 text-gray-200">
<div class="flex-grow">
    <nav class="bg-gray-800 shadow-md border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row flex-wrap items-end justify-center gap-4">

                <div class="w-full md:w-auto">
                    <label for="waveType" class="block text-sm font-medium text-gray-300 mb-1">Tipo de onda:</label>
                    <select id="waveType" class="block w-full bg-gray-700 border border-gray-700 text-white rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                        <option value="NRZ-L">NRZ-L</option>
                        <option value="NRZ-I">NRZ-I</option>
                        <option value="Manchester">Manchester</option>
                        <option value="Manchester Diferencial">Manchester Diferencial</option>
                    </select>
                </div>

                <div class="w-full md:w-auto">
                    <label for="startLevel" class="block text-sm font-medium text-gray-300 mb-1">Nivel de inicio:</label>
                    <select id="startLevel" class="block w-full bg-gray-800 border border-gray-700 text-white rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                        <option value="1">Arriba</option>
                        <option value="-1">Abajo</option>
                    </select>
                </div>

                <div class="w-full md:w-auto flex-grow max-w-xs">
                    <label for="data" class="block text-sm font-medium text-gray-300 mb-1">Datos:</label>
                    <input type="text" id="data" class="block w-full bg-gray-800 border border-gray-700 text-white rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>

                <div class="w-full md:w-auto">
                    <button id="drawButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-md transition duration-200">
                        Dibujar
                    </button>
                </div>

                <div class="w-full md:w-auto flex">
                    <button id="exportButton" class="flex-grow bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-l-md border-r border-blue-800 transition duration-200">
                        Exportar
                    </button>
                    <select id="exportSize" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-2 rounded-r-md cursor-pointer outline-none transition duration-200 appearance-none text-center">
                        <option value="640x360">640x360</option>
                        <option value="1280x720" selected>1280x720</option>
                        <option value="1600x900">1600x900</option>
                        <option value="1920x1080">1920x1080</option>
                    </select>
                </div>

            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
        <div id="alert" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
            <span id="alert-message" class="block sm:inline"></span>
            <button type="button" class="absolute top-0 bottom-0 right-0 px-4 py-3" onclick="document.getElementById('alert').style.display='none'">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <div id="nrzi-alert" class="hidden bg-yellow-100 border border-yellow-400 text-yellow-800 px-4 py-3 rounded relative mb-4" role="alert">
            <span class="block sm:inline">Recuerde que el nivel de inicio invierte el gráfico.</span>
            <button type="button" class="absolute top-0 bottom-0 right-0 px-4 py-3" onclick="document.getElementById('nrzi-alert').style.display='none'">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex justify-center w-full">
        <div id="myDiv" class="w-full max-w-full overflow-x-auto bg-gray-800 p-4 shadow-sm rounded-lg border border-gray-850 min-h-[400px]">
        </div>
    </main>
</div>

<footer class="mt-auto py-6 bg-gray-900 text-gray-400">
    <div class="container mx-auto text-center px-4">
        <a href="https://github.com/byteme-org" target="_blank" class="hover:text-white transition duration-200 text-decoration-none">
            Sitio desarrollado por: <br>
            <i class="bi bi-github text-xl"></i> <span class="font-semibold">ByteMe</span>
        </a>
    </div>
</footer>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="script.js"></script>
</body>

</html>
